project:
  type: book
  output-dir: _book

execute:
  freeze: auto
  timeout: 600
  
mermaid-format: png

book:
  title: "PyData Johannesburg Community Handbook"
  author: "Luis de Sousa"  
  reader-mode: true

  page-footer:
    left: |
      PyData Johannesburg Community Handbook by Luis de Sousa.

  cover-image: images/cover.png
  favicon: images/cover.png
  site-url: https://pydata-johannesburg.github.io
  repo-url: https://github.com/pydata-johannesburg/community-handbook
  repo-branch: main
  repo-actions: [edit, issue]

  chapters:
    - index.qmd
    - introduction.qmd

    - part: "PyData Johannesburg Operating Model"
      chapters:
        - operating-model.qmd
        - organisational-structure.qmd
        - organiser-expectations.qmd

    - part: "Event Operations"
      chapters:
        - event-operations.qmd
        - event-planning-workflow.qmd
        - event-promotion.qmd
        - post-event-activities.qmd

    - part: "Community Infrastructure"
      chapters:
        - community-infrastructure.qmd
        - communication-platforms.qmd
        - knowledge-infrastructure.qmd
        - community-data-assets.qmd

    - part: "Community Development Framework"
      chapters:
        - lessons-from-previous-team.qmd
        - five-structures-long-lived-communities.qmd
        - developer-community-flywheel.qmd
        - emerging-market-advantage.qmd
        - community-maturity-model.qmd
        - organiser-architecture.qmd
        - community-acceleration-signals.qmd

    - part: "Strategic Growth & Vision"
      chapters:
        - strategic-growth-opportunities.qmd
        - long-term-vision.qmd
        - succession-and-sustainability.qmd

    - part: "Appendices"
      chapters:
        - appendices.qmd

format:
  html:
    theme:
      - cosmo
    code-link: true
    author-meta: "Luis de Sousa"
    #include-in-header: plausible.html
    callout-appearance: simple
    mermaid:
      theme: neutral

# PDF output temporarily disabled due to LaTeX compatibility issues
